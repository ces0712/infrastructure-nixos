services:
  builder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nix-pi-builder
    volumes:
      - .:/src
      - nix-store-cache:/nix
      - ${SSH_AUTH_SOCK}:/ssh-agent
    devices:
      - ${SSD_DEVICE:-/dev/sda}:${SSD_DEVICE:-/dev/sda}
    cap_add:
      - SYS_ADMIN
      - MKNOD
    security_opt:
      - no-new-privileges:true
    environment:
      SSH_AUTH_SOCK: /ssh-agent
      PI_HOST: ${PI_HOST:-forgejo-pi.tail8f7f61.ts.net}
      SSD_DEVICE: ${SSD_DEVICE:-/dev/sda}
    command: ["sh", "-c", "make ${MAKE_TARGET:-build}"]
    network_mode: host

volumes:
  nix-store-cache:
