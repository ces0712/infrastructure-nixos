services:
  builder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    platform: linux/arm64
    container_name: nix-pi-builder
    volumes:
      - nix-store-cache:/nix:Z
      - ${SSH_KEYS_PATH:-/tmp/keys}:/tmp/.ssh:ro
      - ./output:/src/output
    cap_add:
      - SYS_ADMIN
    security_opt:
      - label=disable
    environment:
      PI_HOST: ${PI_HOST:-forgejo-pi.tail8f7f61.ts.net}
      SECRETS_PATH: ${SECRETS_PATH:-/tmp/keys}
    command: ["sh", "-c", "./scripts/${MAKE_TARGET:-build}.sh"]

volumes:
  nix-store-cache:
